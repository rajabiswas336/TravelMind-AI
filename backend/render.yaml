services:
  - type: web
    name: travelmind-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DUFFEL_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
