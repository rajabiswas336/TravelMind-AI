services:
  - type: web
    name: travelmind-ai-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DUFFEL_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
